<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia - Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .custom-card {
            border-radius: 8px;
            transition: transform 0.2s ease-in-out;
        }
        .custom-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <!-- Navigasi -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Tech Community</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Beranda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./form.html">Daftar Anggota</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./gallery.html">Multimedia</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Konten Multimedia -->
    <div class="container mt-5 mb-5">
        <h2 class="mb-4 text-center border-bottom pb-3">Galeri & Multimedia</h2>
        
        <div class="row g-4 justify-content-center">
            
            <!-- Interaksi Gambar -->
            <div class="col-md-6">
                <div class="card shadow-sm h-100 border-0 custom-card p-2">
                    <div class="card-body text-center">
                        <h5 class="card-title mb-4 fw-bold">Galeri Solo Leveling Season 2</h5>
                        
                        <img id="galleryImage" src="https://i.pinimg.com/736x/1e/b5/35/1eb5354918d8ad241ae7be4305acec60.jpg" alt="Solo Leveling" class="img-fluid rounded shadow-sm mb-3" style="height: 250px; object-fit: cover; width: 100%; object-position: top;">
                        
                        <button onclick="ubahGambar()" class="btn btn-primary w-100">Ganti Gambar</button>
                    </div>
                </div>
            </div>

            <!-- Interaksi Audio -->
            <div class="col-md-6">
                <div class="card shadow-sm h-100 border-0 custom-card p-2">
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <h5 class="card-title mb-3 fw-bold">Lagu Pilihan</h5>
                        <p class="text-secondary mb-4">Marry Your Daughter - Brian McKnight</p>
                        
                        <audio id="communityAudio" src="Brian McKnight - Marry your daughter lyrics.mp3"></audio>
                        
                        <div class="d-flex justify-content-center gap-2 mt-2">
                            <button onclick="putarAudio()" class="btn btn-success px-4">Play</button>
                            <button onclick="hentiAudio()" class="btn btn-danger px-4">Pause</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Interaksi Video YouTube -->
            <div class="col-lg-10 col-12 mt-4">
                <div class="card shadow-sm border-0 custom-card p-2">
                    <div class="card-body text-center">
                        <h5 class="card-title mb-3 fw-bold">Video Highlight</h5>
                        <div class="ratio ratio-16x9 rounded overflow-hidden">
                            <iframe src="https://www.youtube.com/embed/uIU3TLi7Uhs" title="YouTube video player" allowfullscreen style="border: none;"></iframe>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let isDefaultImage = true;
        
        function ubahGambar() {
            const imgElement = document.getElementById('galleryImage');
            if (isDefaultImage) {
                imgElement.src = "https://i.pinimg.com/736x/ce/00/b2/ce00b24a3beb3effa43a476eb21e4311.jpg"; 
            } else {
                imgElement.src = "https://i.pinimg.com/736x/1e/b5/35/1eb5354918d8ad241ae7be4305acec60.jpg"; 
            }
            isDefaultImage = !isDefaultImage;
        }

        const audio = document.getElementById('communityAudio');
        
        function putarAudio() {
            audio.play();
        }

        function hentiAudio() {
            audio.pause();
        }
    </script>
</body>
</html>
