<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota - Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigasi -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Tech Community</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Beranda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./form.html">Daftar Anggota</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./gallery.html">Multimedia</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Konten Form -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Form Pendaftaran Anggota Baru</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="registrationForm">
                            <div class="mb-3">
                                <label for="inputNama" class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" id="inputNama" required>
                            </div>
                            <div class="mb-3">
                                <label for="inputEmail" class="form-label">Alamat Email</label>
                                <input type="email" class="form-control" id="inputEmail" required>
                            </div>
                            <div class="mb-4">
                                <label for="inputBidang" class="form-label">Bidang Minat</label>
                                <select class="form-select" id="inputBidang" required>
                                    <option value="" selected disabled>Pilih bidang minat...</option>
                                    <option value="Web Development">Web Development</option>
                                    <option value="Jaringan Komputer">Jaringan Komputer (Cisco/Routing)</option>
                                    <option value="Keamanan Siber">Keamanan Siber (CTF)</option>
                                    <option value="Database">Database Administration</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="./index.html" class="btn btn-outline-secondary">Kembali ke Beranda</a>
                                <button type="submit" class="btn btn-success">Submit Data</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Alert & Hasil Input -->
                <div id="resultContainer" class="mt-4 d-none">
                    <div class="alert alert-info border-0 shadow-sm" role="alert">
                        <h5 class="alert-heading">Data Berhasil Disimpan!</h5>
                        <p>Berikut adalah data anggota baru yang dimasukkan ke dalam simulasi array:</p>
                        <hr>
                        <ul id="resultList" class="mb-0"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let dataAnggota = [];

        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const nama = document.getElementById('inputNama').value;
            const email = document.getElementById('inputEmail').value;
            const bidang = document.getElementById('inputBidang').value;

            const anggotaBaru = { nama: nama, email: email, bidang: bidang };
            dataAnggota.push(anggotaBaru);

            alert(`Terima kasih ${nama}! Data kamu berhasil didaftarkan di bidang ${bidang}.`);

            const resultContainer = document.getElementById('resultContainer');
            const resultList = document.getElementById('resultList');
            
            resultList.innerHTML = `
                <li><strong>Nama:</strong> ${nama}</li>
                <li><strong>Email:</strong> ${email}</li>
                <li><strong>Bidang Minat:</strong> ${bidang}</li>
            `;
            
            resultContainer.classList.remove('d-none');
            this.reset();
            console.log("Isi Array Data Anggota:", dataAnggota);
        });
    </script>
</body>
</html>
